<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風險管理基本能力測驗 — 第12屆</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
--ink: #1a1208;
--paper: #f5f0e8;
--paper2: #ede7d8;
--gold: #c8952a;
--gold-light: #e8b84b;
--red: #b83232;
--green: #2a7a3a;
--accent: #5a3e1b;
--line: #c8b89a;
--shadow: rgba(26,18,8,0.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(--paper);
color: var(--ink);
font-family: 'Noto Serif TC', serif;
min-height: 100vh;
background-image:
repeating-linear-gradient(0deg, transparent, transparent 27px, var(--line) 27px, var(--line) 28px);
background-attachment: fixed;
}

/* ── COVER ── */
#cover {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 2rem;
text-align: center;
padding: 3rem 1.5rem;
position: relative;
}
#cover::before {
content: '';
position: fixed; inset: 0;
background: radial-gradient(ellipse at 60% 30%, #e8d8b0 0%, transparent 70%),
radial-gradient(ellipse at 20% 80%, #d4c49a 0%, transparent 60%);
pointer-events: none;
}
.cover-badge {
font-family: 'JetBrains Mono', monospace;
font-size: .75rem;
letter-spacing: .2em;
color: var(--gold);
border: 1px solid var(--gold);
padding: .35em 1.2em;
text-transform: uppercase;
}
.cover-title {
font-size: clamp(1.8rem, 5vw, 3.2rem);
font-weight: 900;
line-height: 1.2;
color: var(--ink);
position: relative;
}
.cover-title span { color: var(--gold); }
.cover-sub {
font-size: 1rem;
color: var(--accent);
line-height: 1.8;
}
.cover-meta {
display: flex; gap: 2.5rem; flex-wrap: wrap; justify-content: center;
font-family: 'JetBrains Mono', monospace;
font-size: .82rem; color: var(--accent);
}
.cover-meta div { display: flex; flex-direction: column; gap: .2rem; align-items: center; }
.cover-meta strong { font-size: 1.4rem; color: var(--ink); font-family: 'Noto Serif TC', serif; font-weight: 900; }
.btn-start {
margin-top: 1rem;
background: var(--ink);
color: var(--paper);
border: none;
padding: 1em 3em;
font-family: 'Noto Serif TC', serif;
font-size: 1.05rem;
font-weight: 600;
cursor: pointer;
letter-spacing: .05em;
transition: background .2s, transform .1s;
position: relative;
}
.btn-start::after {
content: '';
position: absolute;
bottom: -4px; right: -4px;
width: 100%; height: 100%;
border: 2px solid var(--gold);
pointer-events: none;
}
.btn-start:hover { background: var(--accent); transform: translate(-2px,-2px); }
.divider { width: 120px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

/* ── QUIZ ── */
#quiz { display: none; min-height: 100vh; padding: 2rem 1rem 4rem; }

.progress-bar-wrap {
position: fixed; top: 0; left: 0; right: 0; z-index: 99;
height: 4px; background: var(--paper2);
}
.progress-bar-fill {
height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light));
transition: width .4s ease;
}
.quiz-header {
position: fixed; top: 4px; left: 0; right: 0; z-index: 98;
background: rgba(245,240,232,.95);
backdrop-filter: blur(6px);
border-bottom: 1px solid var(--line);
display: flex; align-items: center; justify-content: space-between;
padding: .6rem 1.5rem;
font-family: 'JetBrains Mono', monospace;
font-size: .82rem;
}
.quiz-counter { color: var(--accent); }
.quiz-score-live { color: var(--gold); font-weight: 700; }
.quiz-timer { color: var(--ink); }

.question-card {
max-width: 780px;
margin: 5.5rem auto 0;
animation: fadeUp .3s ease;
}
@keyframes fadeUp {
from { opacity:0; transform: translateY(14px); }
to { opacity:1; transform: translateY(0); }
}

.q-meta {
display: flex; justify-content: space-between; align-items: center;
margin-bottom: .8rem;
font-family: 'JetBrains Mono', monospace; font-size: .75rem;
color: var(--accent);
}
.q-score-badge {
background: var(--ink); color: var(--gold);
padding: .15em .7em; font-size: .7rem;
}

.question-box {
background: white;
border: 1.5px solid var(--line);
border-left: 5px solid var(--gold);
padding: 1.4rem 1.6rem;
margin-bottom: 1.2rem;
box-shadow: 4px 4px 0 var(--shadow);
font-size: 1rem;
line-height: 1.85;
font-weight: 600;
}

.options { display: flex; flex-direction: column; gap: .7rem; }

.option-btn {
display: flex; align-items: flex-start; gap: .9rem;
background: white;
border: 1.5px solid var(--line);
padding: .9rem 1.1rem;
cursor: pointer;
text-align: left;
font-family: 'Noto Serif TC', serif;
font-size: .95rem;
line-height: 1.7;
transition: border-color .15s, background .15s, transform .1s;
position: relative;
box-shadow: 2px 2px 0 var(--shadow);
}
.option-btn:hover:not(:disabled) {
border-color: var(--gold);
background: #fdf8ef;
transform: translate(-1px,-1px);
box-shadow: 3px 3px 0 var(--shadow);
}
.option-btn:disabled { cursor: default; }
.option-label {
font-family: 'JetBrains Mono', monospace;
font-weight: 700;
font-size: .82rem;
min-width: 1.6rem;
color: var(--accent);
padding-top: .12em;
flex-shrink: 0;
}
.option-btn.correct {
background: #eaf7ec;
border-color: var(--green);
box-shadow: 2px 2px 0 rgba(42,122,58,.2);
}
.option-btn.correct .option-label { color: var(--green); }
.option-btn.wrong {
background: #fdf0f0;
border-color: var(--red);
box-shadow: 2px 2px 0 rgba(184,50,50,.2);
}
.option-btn.wrong .option-label { color: var(--red); }
.option-btn.reveal-correct {
background: #f0faf2;
border-color: var(--green);
border-style: dashed;
}
.option-btn.reveal-correct .option-label { color: var(--green); }

.feedback-row {
display: flex; align-items: center; gap: .8rem;
margin-top: 1rem;
padding: .7rem 1rem;
font-size: .9rem;
font-weight: 600;
animation: fadeUp .2s ease;
}
.feedback-correct { color: var(--green); background: #eaf7ec; border-left: 4px solid var(--green); }
.feedback-wrong { color: var(--red); background: #fdf0f0; border-left: 4px solid var(--red); }
.feedback-icon { font-size: 1.2rem; }

.nav-row {
display: flex; justify-content: flex-end; margin-top: 1.4rem; gap: .8rem;
}
.btn-next, .btn-skip {
border: 1.5px solid var(--ink);
background: transparent;
color: var(--ink);
padding: .6em 1.8em;
font-family: 'Noto Serif TC', serif;
font-size: .9rem;
cursor: pointer;
transition: background .15s, color .15s;
}
.btn-next:hover { background: var(--ink); color: var(--paper); }
.btn-skip { border-color: var(--line); color: var(--accent); font-size: .82rem; }
.btn-skip:hover { background: var(--paper2); }

/* ── RESULT ── */
#result { display: none; min-height: 100vh; padding: 3rem 1.5rem; }
.result-wrap { max-width: 700px; margin: 0 auto; }
.result-head { text-align: center; margin-bottom: 2.5rem; }
.result-score-ring {
width: 160px; height: 160px;
border-radius: 50%;
border: 6px solid var(--gold);
display: flex; flex-direction: column;
align-items: center; justify-content: center;
margin: 0 auto 1.5rem;
background: white;
box-shadow: 0 0 0 12px var(--paper2), 0 0 0 14px var(--line);
}
.result-score-num { font-size: 2.8rem; font-weight: 900; color: var(--ink); line-height: 1; }
.result-score-denom { font-size: .85rem; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.result-grade { font-size: 1.6rem; font-weight: 900; margin: .5rem 0; }
.result-stats {
display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center;
margin: 1rem 0 2rem;
font-family: 'JetBrains Mono', monospace; font-size: .82rem;
}
.result-stat { display: flex; flex-direction: column; align-items: center; gap: .2rem; }
.result-stat strong { font-size: 1.3rem; font-family: 'Noto Serif TC', serif; }
.btn-review, .btn-restart {
padding: .7em 2em;
font-family: 'Noto Serif TC', serif; font-size: .95rem;
cursor: pointer; border: none; margin: .4rem;
}
.btn-restart { background: var(--ink); color: var(--paper); }
.btn-restart:hover { background: var(--accent); }
.btn-review { background: transparent; border: 1.5px solid var(--ink); color: var(--ink); }
.btn-review:hover { background: var(--paper2); }

/* Review list */
.review-section { margin-top: 2.5rem; }
.review-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 1rem; padding-bottom: .4rem; border-bottom: 2px solid var(--gold); }
.review-item {
background: white; border: 1.5px solid var(--line);
padding: 1rem 1.2rem; margin-bottom: .9rem;
border-left: 4px solid var(--line);
}
.review-item.ri-wrong { border-left-color: var(--red); }
.review-item.ri-correct{ border-left-color: var(--green); }
.ri-q { font-weight: 600; font-size: .92rem; line-height: 1.7; margin-bottom: .5rem; }
.ri-row { font-size: .83rem; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.ri-correct-ans { color: var(--green); font-weight: 700; }
.ri-wrong-ans { color: var(--red); font-weight: 700; }

@media(max-width:600px){
.question-box { font-size: .9rem; padding: 1rem 1rem; }
.option-btn { font-size: .88rem; }
}
</style>
</head>
<body>

<!-- COVER -->
<section id="cover">
<div class="cover-badge">台灣金融研訓院</div>
<div class="divider"></div>
<h1 class="cover-title">第 12 屆<br><span>風險管理</span>基本能力測驗</h1>
<p class="cover-sub">科目：風險管理制度與實務<br>選項順序隨機 · 題目順序隨機</p>
<div class="divider"></div>
<div class="cover-meta">
<div><strong>60</strong>題目總數</div>
<div><strong>100</strong>滿分</div>
<div><strong>1.5／2</strong>每題配分</div>
</div>
<button class="btn-start" onclick="startQuiz()">開始測驗</button>
</section>

<!-- QUIZ -->
<section id="quiz">
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
<div class="quiz-header">
<span class="quiz-counter" id="qCounter">第 1 題 / 60</span>
<span class="quiz-timer" id="qTimer">00:00</span>
<span class="quiz-score-live" id="qScoreLive">得分 0</span>
</div>
<div class="question-card" id="questionCard"></div>
</section>

<!-- RESULT -->
<section id="result">
<div class="result-wrap">
<div class="result-head">
<div class="result-score-ring">
<div class="result-score-num" id="rScore">0</div>
<div class="result-score-denom">/ 100 分</div>
</div>
<div class="result-grade" id="rGrade">—</div>
<div class="result-stats">
<div class="result-stat"><strong id="rCorrect">0</strong>答對</div>
<div class="result-stat"><strong id="rWrong">0</strong>答錯</div>
<div class="result-stat"><strong id="rTime">—</strong>用時</div>
</div>
<button class="btn-restart" onclick="restartQuiz()">🔄 重新測驗</button>
<button class="btn-review" onclick="toggleReview()">📋 查看解析</button>
</div>
<div class="review-section" id="reviewSection" style="display:none"></div>
</div>
</section>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const rawQuestions = [
// Q1-40 1.5分
{id:1, pts:1.5, q:'「借長貸短」的資金部位，可能存在何種風險？', opts:['再投資風險','再融資風險','市場價值風險','信用風險'], ans:1},
{id:2, pts:1.5, q:'原則上，銀行的自有資本對風險性資產的比率愈高時，其承擔的資本風險將如何變化？', opts:['愈大','愈小','不變','無關'], ans:1},
{id:3, pts:1.5, q:'大衛是美國的投資者，購買一張德國債券 1,000 歐元，購買當時的即期匯率為 1 歐元兌換 1.25 美元，經過了一年，歐元升值至 1 歐元兌換 1.5385 美元，請問此投資者來自匯率變動的損益如何？', opts:['獲利 288.5 美元','損失 288.5 美元','獲利 288.5 歐元','損失 288.5 歐元'], ans:0},
{id:4, pts:1.5, q:'有關績效評量，下列哪些單位不適用利潤中心制？ A.資訊處 B.人力資源處 C.總務處 D.法令遵循處', opts:['僅 D','僅 ABD','僅 BCD','ABCD'], ans:3},
{id:5, pts:1.5, q:'有關資金移轉價格，下列敘述何者較不適當？', opts:['全行的會計利潤係指「本期損益」，用來描述銀行在某段經營期間的經營成果','銀行營業單位所稱的營運利潤，包括內部損益與外部損益','銀行的聯行往來政策，應優先追求閒置資金的利潤極大化','存放款顧客的價格簡稱存款利率與放款利率，是藉由內部移轉價格加減利潤目標而訂定'], ans:2},
{id:6, pts:1.5, q:'下列何者不屬於「責任中心體系」的分類要素？', opts:['區域中心','成本（費用）中心','利潤中心','投資中心'], ans:0},
{id:7, pts:1.5, q:'銀行整合組織目標與部門目標之管理機制，下列敘述何者錯誤？', opts:['單軌制的內部轉撥價格相較於多軌制的內部轉撥價格更能正確反映政策目標','根據風險資本的配置系統(Capital allocation system)，應將營業單位、業務項目和交易活動的所有風險，緊密地與銀行自有資本搭配','各項業務及主管的風險權限若按「風險值」衡量，對風險資本的配置與績效目標有否達成的研判可更加客觀','總行財務處可以使用聯行往來的資金調撥系統，剖析分行等營業單位的營運利潤，並引導各項業務配合全行的經營政策'], ans:0},
{id:8, pts:1.5, q:'下列何者是合理的風險管理觀念？', opts:['不宜使用相同風險標準看待所有員工，但部屬的責任要大於主管','組織的前台與中台部門均要面對風險挑戰，只有後台部門不用','風險管理的決策，「從上而下」比「由下往上」的重要','風險產生單位與監督單位不宜相互隸屬，使用風險管理指標和標準也應不同'], ans:3},
{id:9, pts:1.5, q:'本國銀行以「內保外貸」承作陸資企業授信之運作模式，係指下列何者？', opts:['借款企業需提供外資銀行開立的擔保信用狀，擔保該借款客戶履行合約義務或責任','借款企業之負責人需提供連帶保證，擔保該借款客戶履行合約義務或責任','借款企業需提供銀行存單做為放款之擔保品','借款企業需提供其境外子公司做為放款擔保人，共同承擔履約義務'], ans:0},
{id:10, pts:1.5, q:'關於財務比率分析，下列敘述何者錯誤？', opts:['企業預付費用變高而導致速動比率降低時，其短期償債能力即變差','企業財務槓桿比率愈高，承擔之財務風險即愈大','企業存貨週轉率愈高，意味庫存管理能力愈差及資金積壓愈多','企業應收帳款週轉率愈高，意味現金回收速度即越快'], ans:2},
{id:11, pts:1.5, q:'銀行接受廠商委託，向國外商品勞務的賣方簽定「即期跟單匯票」，於完成信用狀約定下，先行墊付款項。然後，通知借款人在合理期限內「備款贖單」之票據融通方式，稱為哪種業務？', opts:['墊付國內票款','墊付出口票款','出口押匯','進口押匯'], ans:3},
{id:12, pts:1.5, q:'根據 2020 年 12 月底的統計數據，消費性貸款中，哪項業務承作金額最多？', opts:['購置住宅貸款','房屋修繕貸款','汽車貸款','信用卡循環信用餘額'], ans:0},
{id:13, pts:1.5, q:'關於房屋淨值放款，下列敘述何者錯誤？', opts:['有時稱為二胎房貸，還款方式不屬於「封閉式信用貸款」','求償權居於第二順位','以房屋市場價值而非房屋淨值，當作抵押品','房屋淨值是由房屋市場價值與第一順位抵押借款餘額相減而得'], ans:2},
{id:14, pts:1.5, q:'企業想在國外發行普通公司債、轉換公司債與存託憑證，適宜接觸何種信用評等機構？', opts:["Joint Credit Information Center;JCIC","Taiwan Ratings Corp.;TRC","Moody's","Taiwan Economic Journal;TEJ"], ans:2},
{id:15, pts:1.5, q:'銀行藉由內部評等模型計算出的風險限額，稱為下列何者？', opts:['信用風險值','違約機率','逾放比率','市場風險值'], ans:0},
{id:16, pts:1.5, q:'銀行法對「利害關係人」之規範，下列敘述何者錯誤？', opts:['適用同一授信客戶之每筆或累計擔保授信金額達新臺幣 1 億元以上或銀行淨值 1%孰低者','對同一法人之擔保授信總餘額，不得超過銀行淨值 10%','對同一自然人之擔保授信總餘額，不得超過銀行淨值 2%','對所有利害關係人之擔保授信總餘額，不得超過銀行淨值二倍'], ans:3},
{id:17, pts:1.5, q:'銀行授信或風險管理主管依主觀經驗與判斷，考量借戶有否警示性財務比率、重複計算定性指標的分數、黑名單等資訊，並做等級調整，屬於何種評等？', opts:['基本模型的評等','授信戶的個別評等','授信特徵評等','財務評等'], ans:1},
{id:18, pts:1.5, q:'銀行在信用風險集中度的授信架構，將授信對象分成哪三種層面做總風險限額的控管？', opts:['自然人、法人與集團企業','大型企業、中型企業與小型企業','優等客戶、一般客戶與高風險客戶','客戶、產業與國家別分類'], ans:3},
{id:19, pts:1.5, q:'銀行公會針對中小型企業的信用評分，構面包括財務狀況、經營管理，以及產業特性暨展望三項，此三項構面的評分比重為何？', opts:['50%、30%及 20%','40%、40%及 20%','40%、30%及 30%','30%、30%及 40%'], ans:1},

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let questions = [];
let current = 0;
let score = 0;
let results = [];
let answered = false;
let timerInterval = null;
let elapsed = 0;
let shuffledOptionMaps = []; // [{shuffledOpts, correctShuffledIdx}]

function shuffle(arr) {
const a = [...arr];
for (let i = a.length-1; i>0; i--) {
const j = Math.floor(Math.random()*(i+1));
[a[i],a[j]] = [a[j],a[i]];
}
return a;
}

function prepareQuestions() {
questions = shuffle(rawQuestions);
shuffledOptionMaps = questions.map(q => {
const idxs = [0,1,2,3];
const shuffled = shuffle(idxs);
const correctShuffled = shuffled.indexOf(q.ans);
return { shuffledIdxs: shuffled, correctShuffledIdx: correctShuffled };
});
}

// ══════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════
function startTimer() {
elapsed = 0;
clearInterval(timerInterval);
timerInterval = setInterval(() => {
elapsed++;
const m = String(Math.floor(elapsed/60)).padStart(2,'0');
const s = String(elapsed%60).padStart(2,'0');
document.getElementById('qTimer').textContent = m+':'+s;
}, 1000);
}
function stopTimer() { clearInterval(timerInterval); }
function formatTime(sec) {
const m = Math.floor(sec/60);
const s = sec%60;
return `${m}分${s}秒`;
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderQuestion() {
const q = questions[current];
const map = shuffledOptionMaps[current];
answered = false;

const pct = (current/60)*100;
document.getElementById('progressBar').style.width = pct+'%';
document.getElementById('qCounter').textContent = `第 ${current+1} 題 / 60`;
document.getElementById('qScoreLive').textContent = `得分 ${score.toFixed(1)}`;

const labels = ['(1)','(2)','(3)','(4)'];
let optsHTML = map.shuffledIdxs.map((origIdx, si) => {
return `<button class="option-btn" onclick="selectOption(${si})" data-si="${si}">
<span class="option-label">${labels[si]}</span>
<span>${q.opts[origIdx]}</span>
</button>`;
}).join('');

document.getElementById('questionCard').innerHTML = `
<div class="q-meta">
<span>第 ${q.id} 題（原始編號）</span>
<span class="q-score-badge">配分 ${q.pts} 分</span>
</div>
<div class="question-box">${q.q}</div>
<div class="options">${optsHTML}</div>
<div id="feedback"></div>
<div class="nav-row">
<button class="btn-skip" onclick="skipQuestion()">跳過此題 →</button>
<button class="btn-next" id="btnNext" onclick="nextQuestion()" style="display:none">下一題 →</button>
</div>
`;
}

function selectOption(si) {
if (answered) return;
answered = true;
const q = questions[current];
const map = shuffledOptionMaps[current];
const isCorrect = (si === map.correctShuffledIdx);

document.querySelectorAll('.option-btn').forEach((btn,i) => {
btn.disabled = true;
if (i === map.correctShuffledIdx) btn.classList.add(isCorrect ? 'correct' : 'reveal-correct');
if (i === si && !isCorrect) btn.classList.add('wrong');
});

const fb = document.getElementById('feedback');
if (isCorrect) {
score += q.pts;
document.getElementById('qScoreLive').textContent = `得分 ${score.toFixed(1)}`;
fb.innerHTML = `<div class="feedback-row feedback-correct"><span class="feedback-icon">✓</span> 答對！獲得 ${q.pts} 分</div>`;
results.push({ q, userSi: si, correctSi: map.correctShuffledIdx, correct: true, shuffledIdxs: map.shuffledIdxs });
} else {
const correctOrigLabel = q.opts[map.shuffledIdxs[map.correctShuffledIdx]];
fb.innerHTML = `<div class="feedback-row feedback-wrong"><span class="feedback-icon">✗</span> 答錯！正確答案：${correctOrigLabel}</div>`;
results.push({ q, userSi: si, correctSi: map.correctShuffledIdx, correct: false, shuffledIdxs: map.shuffledIdxs });
}

document.getElementById('btnNext').style.display = '';
}

function skipQuestion() {
if (!answered) {
results.push({ q: questions[current], userSi: -1, correctSi: shuffledOptionMaps[current].correctShuffledIdx, correct: false, skipped: true, shuffledIdxs: shuffledOptionMaps[current].shuffledIdxs });
nextQuestion();
}
}

function nextQuestion() {
current++;
if (current >= 60) {
endQuiz();
} else {
renderQuestion();
}
}

// ══════════════════════════════════════════
// START / END
// ══════════════════════════════════════════
function startQuiz() {
prepareQuestions();
current = 0; score = 0; results = [];
document.getElementById('cover').style.display = 'none';
document.getElementById('quiz').style.display = 'block';
startTimer();
renderQuestion();
}

function endQuiz() {
stopTimer();
document.getElementById('quiz').style.display = 'none';
document.getElementById('result').style.display = 'block';

const correct = results.filter(r=>r.correct).length;
const wrong = results.filter(r=>!r.correct).length;
const scoreRnd = Math.round(score * 10) / 10;

document.getElementById('rScore').textContent = scoreRnd;
document.getElementById('rCorrect').textContent = correct;
document.getElementById('rWrong').textContent = wrong;
document.getElementById('rTime').textContent = formatTime(elapsed);

let grade = '';
if (scoreRnd >= 90) grade = '🏆 優秀';
else if (scoreRnd >= 70) grade = '✅ 及格';
else if (scoreRnd >= 60) grade = '⚠️ 邊緣';
else grade = '❌ 未及格';
document.getElementById('rGrade').textContent = grade;
}

function restartQuiz() {
document.getElementById('result').style.display = 'none';
document.getElementById('reviewSection').style.display = 'none';
startQuiz();
}

function toggleReview() {
const sec = document.getElementById('reviewSection');
if (sec.style.display !== 'none') { sec.style.display = 'none'; return; }

const labels = ['(1)','(2)','(3)','(4)'];
let html = '<div class="review-title">逐題解析</div>';
results.forEach((r, i) => {
const cls = r.correct ? 'ri-correct' : 'ri-wrong';
const correctText = r.q.opts[r.shuffledIdxs[r.correctSi]];
const userText = r.userSi >= 0 ? r.q.opts[r.shuffledIdxs[r.userSi]] : '（未作答）';
html += `<div class="review-item ${cls}">
<div class="ri-q">第${i+1}題（原始題號 ${r.q.id}）：${r.q.q}</div>
<div class="ri-row">正確答案：<span class="ri-correct-ans">${correctText}</span></div>
${!r.correct ? `<div class="ri-row">你的作答：<span class="ri-wrong-ans">${userText}</span></div>` : ''}
</div>`;
});
sec.innerHTML = html;
sec.style.display = 'block';
sec.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
